<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud OneNote</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e1e1e; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* OneNote-style Left Sidebar */
        .sidebar { width: 220px; background-color: #252526; height: 100%; padding: 20px; border-right: 1px solid #3c3c3c; box-sizing: border-box; }
        .sidebar h3 { color: #bb86fc; margin-top: 0; }
        .logout-link { color: #cf6679; text-decoration: none; font-size: 14px; display: block; margin-top: 30px; }
        
        /* Right Side Content Areas */
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        /* OneNote Word Ribbon Control Bar */
        .ribbon { background-color: #2d2d2d; padding: 10px; border-radius: 8px; display: flex; gap: 8px; align-items: center; margin-bottom: 15px; border: 1px solid #3c3c3c; }
        select, button { background-color: #3c3c3c; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { background-color: #505050; }
        
        .ai-btn { background-color: #03dac6; color: #121212; border: none; }
        .ai-btn:hover { background-color: #01b4a3; }
        .save-btn { background-color: #bb86fc; color: black; border: none; margin-left: auto; }
        .save-btn:hover { background-color: #9965db; }
        
        /* Layout split for Typing and History */
        .workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        /* OneNote Canvas (Rich Text Input) */
        .editor { flex: 2; background-color: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px solid #444; font-size: 16px; outline: none; overflow-y: auto; height: 100%; box-sizing: border-box; }
        .editor:empty:before { content: "Start typing your styled notes here, highlight text to format, or type a prompt for Gemini..."; color: #aaa; }
        
        /* Saved notes column */
        .history { flex: 1; background-color: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-y: auto; height: 100%; box-sizing: border-box; }
        .history h4 { margin-top: 0; color: #a0a0a0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .saved-note-card { background-color: #252526; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #bb86fc; font-size: 14px; word-break: break-word; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>💜 Notebooks</h3>
        <p style="color: #bb86fc; font-weight: bold; cursor: pointer;">• Quick Notes</p>
        <p style="color: #666; font-size: 13px;">+ Add Custom Section</p>
        <a href="/logout" class="logout-link">🔒 Lock & Log Out</a>
    </div>

    <div class="main-content">
        <div class="ribbon">
            <select id="fontName" onchange="execCommand('fontName', this.value)">
                <option value="Segoe UI">Segoe UI</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>
            
            <select id="fontSize" onchange="changeSize(this.value)">
                <option value="4">Normal</option>
                <option value="6">Heading</option>
                <option value="3">Small</option>
            </select>

            <button onclick="execCommand('bold')">B</button>
            <button onclick="execCommand('italic')">I</button>
            <button onclick="execCommand('underline')">U</button>
            <button onclick="execCommand('insertUnorderedList')">• List</button>
            
            <button class="ai-btn" onclick="askGemini()">✨ Ask Gemini AI</button>
            <button class="save-btn" onclick="saveNote()">Save Note to Cloud</button>
        </div>

        <div class="workspace">
            <div id="noteEditor" class="editor" contenteditable="true"></div>
            
            <div class="history">
                <h4>📜 Server Saved Notes</h4>
                <div id="notesContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // Core rich text editing utilities
        function execCommand(command, value = null) {
            document.execCommand(command, false, value);
        }
        
        function changeSize(sizeValue) {
            document.execCommand('fontSize', false, sizeValue);
        }

        // Fetch and load notes immediately on start
        document.addEventListener("DOMContentLoaded", fetchNotes);

        async function fetchNotes() {
            let res = await fetch('/get_notes');
            if (res.status === 200) {
                let notes = await res.json();
                let container = document.getElementById("notesContainer");
                container.innerHTML = "";
                notes.forEach(n => {
                    let div = document.createElement("div");
                    div.classList.add("saved-note-card");
                    div.innerHTML = n.content;
                    container.appendChild(div);
                });
            }
        }

        async function saveNote() {
            let editor = document.getElementById("noteEditor");
            let content = editor.innerHTML.trim();
            if (!content) return;

            let res = await fetch('/save_note', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });

            if (res.ok) {
                editor.innerHTML = "";
                fetchNotes();
            }
        }

        async function askGemini() {
            let editor = document.getElementById("noteEditor");
            let currentText = editor.innerText.trim();
            if (!currentText) {
                alert("Type an AI prompt directly into the notebook canvas first!");
                return;
            }

            editor.innerHTML += "<br><br><i style='color:#03dac6;'>Gemini is writing... ✨</i><br>";
            
            let res = await fetch('/ask_gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: currentText })
            });

            let data = await res.json();
            
            // Clean up the placeholder message
            fetchNotes(); 
            
            if (data.reply) {
                // Formatting the response layout cleanly inside your rich content window
                let formattedReply = "<br><div style='color:#03dac6; border-left:3px solid #03dac6; padding-left:10px; margin:10px 0;'>" + 
                                     data.reply.replace(/\n/g, "<br>") + 
                                     "</div><br>";
                editor.innerHTML = currentText + formattedReply;
            } else {
                alert("Error calling AI: " + (data.error || "Unknown glitch"));
                fetchNotes();
            }
        }
    </script>
</body>
</html>
