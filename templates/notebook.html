<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud OneNote</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.85em%22 x=%225%22 font-size=%2280%22>💜</text></svg>">
    <style>
        /* 🎨 THEME VARIABLES (Defaults to Light Mode) */
        :root {
            --bg-body: #f8f9fa;       /* Premium off-white background */
            --bg-sidebar: #f1f3f5;   /* Distinct, slightly darker gray for sidebar */
            --bg-card: #ffffff;      /* Crisp pure white canvas/ribbon */
            --bg-history: #f1f3f5;   /* Matches sidebar background for layout symmetry */
            --text-main: #212529;    /* Deep charcoal text (highly legible) */
            --text-muted: #6c757d;   /* Subtle grey for secondary labels */
            --border-color: #dee2e6; /* Clear, sharp dividing lines */
            --input-bg: #f8f9fa;     /* Input fields contrast beautifully */
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02); /* Soft depth */
            --sidebar-header: #6f42c1; /* Deeper purple for light-mode visibility */
            --ai-text: #007a70;      /* Darker teal for accessible contrast */
        }

        /* 🌙 DARK MODE OVERRIDES */
        [data-theme="dark"] {
            --bg-body: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-card: #2d2d2d;
            --bg-history: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #3c3c3c;
            --input-bg: #3c3c3c;
            --shadow: transparent;
            --sidebar-header: #bb86fc;
            --ai-text: #03dac6;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        /* OneNote-style Left Sidebar */
        .sidebar { width: 220px; background-color: var(--bg-sidebar); height: 100%; padding: 20px; border-right: 1px solid var(--border-color); box-sizing: border-box; transition: background 0.3s, border-color 0.3s; }
        .sidebar h3 { color: var(--sidebar-header); margin-top: 0; transition: color 0.3s; }
        .logout-link { color: #dc3545; text-decoration: none; font-size: 14px; display: block; margin-top: 30px; } /* Darker red for light mode */
        [data-theme="dark"] .logout-link { color: #cf6679; }
        
        /* Right Side Content Areas */
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        /* OneNote Word Ribbon Control Bar */
        .ribbon { background-color: var(--bg-card); padding: 10px; border-radius: 8px; display: flex; gap: 8px; align-items: center; margin-bottom: 15px; border: 1px solid var(--border-color); box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
        select, button { background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        button:hover { background-color: #e2e6ea; color: #212529; }
        [data-theme="dark"] button:hover { background-color: #505050; color: white; }
        
        .ai-btn { background-color: #007a70; color: #ffffff; border: none; }
        .ai-btn:hover { background-color: #005a52; color: #ffffff; }
        [data-theme="dark"] .ai-btn { background-color: #03dac6; color: #121212; }
        [data-theme="dark"] .ai-btn:hover { background-color: #01b4a3; color: #121212; }

        .save-btn { background-color: #6f42c1; color: white; border: none; }
        .save-btn:hover { background-color: #5a32a3; }
        [data-theme="dark"] .save-btn { background-color: #bb86fc; color: black; }
        [data-theme="dark"] .save-btn:hover { background-color: #9965db; }

        .theme-btn { background-color: #6c757d; color: white; border: none; margin-left: auto; }
        [data-theme="dark"] .theme-btn { background-color: #555; color: white; }
        [data-theme="dark"] .theme-btn:hover { background-color: #5a6268; }
        
        /* Layout split for Typing and History */
        .workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        /* OneNote Canvas (Rich Text Input) */
        .editor { flex: 2; background-color: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; outline: none; overflow-y: auto; height: 100%; box-sizing: border-box; box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
        .editor:empty:before { content: "Start typing your styled notes here, highlight text to format, or type a prompt for Gemini..."; color: #adb5bd; }
        [data-theme="dark"] .editor:empty:before { color: #aaa; }
        
        /* Saved notes column */
        .history { flex: 1; background-color: var(--bg-history); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); overflow-y: auto; height: 100%; box-sizing: border-box; transition: background 0.3s, border-color 0.3s; }
        .history h4 { margin-top: 0; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; transition: color 0.3s, border-color 0.3s; }
        .saved-note-card { background-color: var(--bg-card); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--sidebar-header); font-size: 14px; word-break: break-word; color: var(--text-main); box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>💜 Notebooks</h3>
        <p style="color: var(--sidebar-header); font-weight: bold; cursor: pointer; transition: color 0.3s;">• Quick Notes</p>
        <p style="color: var(--text-muted); font-size: 13px; transition: color 0.3s;">+ Add Custom Section</p>
        <a href="/logout" class="logout-link">🔒 Lock & Log Out</a>
    </div>

    <div class="main-content">
        <div class="ribbon">
            <select id="fontName" onchange="execCommand('fontName', this.value)">
                <option value="Segoe UI">Segoe UI</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>
            
            <select id="fontSize" onchange="changeSize(this.value)">
                <option value="4">Normal</option>
                <option value="6">Heading</option>
                <option value="3">Small</option>
            </select>

            <button onclick="execCommand('bold')">B</button>
            <button onclick="execCommand('italic')">I</button>
            <button onclick="execCommand('underline')">U</button>
            <button onclick="execCommand('insertUnorderedList')">• List</button>
            
            <button class="ai-btn" onclick="askGemini()">✨ Ask Gemini AI</button>
            <button class="save-btn" onclick="saveNote()">Save Note to Cloud</button>
            
            <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
        </div>

        <div class="workspace">
            <div id="noteEditor" class="editor" contenteditable="true"></div>
            
            <div class="history">
                <h4>📜 Server Saved Notes</h4>
                <div id="notesContainer"></div>
            </div>
        </div>
    </div>

    <script>
        function execCommand(command, value = null) {
            document.execCommand(command, false, value);
        }
        
        function changeSize(sizeValue) {
            document.execCommand('fontSize', false, sizeValue);
        }

        // 🌓 Theme Toggler Script (Defaults to Light, Toggles to Dark)
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            if (currentTheme === "dark") {
                document.documentElement.removeAttribute("data-theme");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        }

        document.addEventListener("DOMContentLoaded", fetchNotes);

        async function fetchNotes() {
            let res = await fetch('/get_notes');
            if (res.status === 200) {
                let notes = await res.json();
                let container = document.getElementById("notesContainer");
                container.innerHTML = "";
                notes.forEach(n => {
                    let div = document.createElement("div");
                    div.classList.add("saved-note-card");
                    div.innerHTML = n.content;
                    container.appendChild(div);
                });
            }
        }

        async function saveNote() {
            let editor = document.getElementById("noteEditor");
            let content = editor.innerHTML.trim();
            if (!content) return;

            let res = await fetch('/save_note', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });

            if (res.ok) {
                editor.innerHTML = "";
                fetchNotes();
            }
        }

        async function askGemini() {
            let editor = document.getElementById("noteEditor");
            let currentText = editor.innerText.trim();
            if (!currentText) {
                alert("Type an AI prompt directly into the notebook canvas first!");
                return;
            }

            // Dynamically check text color for loading indicator depending on theme
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            const loadingColor = isDark ? "#03dac6" : "#007a70";

            editor.innerHTML += `<br><br><i style='color:${loadingColor};'>Gemini is writing... ✨</i><br>`;
            
            let res = await fetch('/ask_gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: currentText })
            });

            let data = await res.json();
            fetchNotes(); 
            
            if (data.reply) {
                let formattedReply = `<br><div style='color:var(--ai-text); border-left:3px solid var(--ai-text); padding-left:10px; margin:10px 0;'>` + 
                                     data.reply.replace(/\n/g, "<br>") + 
                                     "</div><br>";
                editor.innerHTML = currentText + formattedReply;
            } else {
                alert("Error calling AI: " + (data.error || "Unknown glitch"));
                fetchNotes();
            }
        }
    </script>
</body>
</html>
