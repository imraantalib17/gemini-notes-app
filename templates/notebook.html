<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud OneNote</title>
    <!-- 💜 Favicon perfectly centered and padded -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>💜</text></svg>">
    <style>
        /* 🎨 THEME VARIABLES */
        :root {
            --bg-body: #f8f9fa;
            --bg-sidebar: #f1f3f5;
            --bg-card: #ffffff;
            --bg-history: #f1f3f5;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --input-bg: #f8f9fa;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            --sidebar-header: #6f42c1;
            --ai-text: #007a70;
            --btn-green: #198754;
            --btn-green-hover: #157347;
        }

        [data-theme="dark"] {
            --bg-body: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-card: #2d2d2d;
            --bg-history: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #3c3c3c;
            --input-bg: #3c3c3c;
            --shadow: transparent;
            --sidebar-header: #bb86fc;
            --ai-text: #03dac6;
            --btn-green: #2ecc71;
            --btn-green-hover: #27ae60;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        .sidebar { width: 220px; background-color: var(--bg-sidebar); height: 100%; padding: 20px; border-right: 1px solid var(--border-color); box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar h3 { color: var(--sidebar-header); margin-top: 0; }
        .logout-link { color: #dc3545; text-decoration: none; font-size: 14px; margin-top: auto; display: block; }
        [data-theme="dark"] .logout-link { color: #cf6679; }
        
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        .ribbon { background-color: var(--bg-card); padding: 10px; border-radius: 8px; display: flex; gap: 8px; align-items: center; margin-bottom: 15px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        select, button { background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { background-color: #e2e6ea; color: #212529; }
        [data-theme="dark"] button:hover { background-color: #505050; color: white; }
        
        .ai-btn { background-color: #007a70; color: #ffffff; border: none; }
        .ai-btn:hover { background-color: #005a52; color: #ffffff; }
        [data-theme="dark"] .ai-btn { background-color: #03dac6; color: #121212; }

        .save-btn { background-color: #6f42c1; color: white; border: none; }
        .save-btn:hover { background-color: #5a32a3; }
        [data-theme="dark"] .save-btn { background-color: #bb86fc; color: black; }

        .download-btn { background-color: #0d6efd; color: white; border: none; }
        .download-btn:hover { background-color: #0b5ed7; }

        .theme-btn { background-color: #6c757d; color: white; border: none; margin-left: auto; }
        
        .workspace { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        .editor { flex: 2; background-color: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; outline: none; overflow-y: auto; height: 100%; box-sizing: border-box; box-shadow: var(--shadow); }
        .editor:empty:before { content: "Start typing your styled notes here, highlight text to format, or type a prompt for Gemini..."; color: #adb5bd; }
        
        /* 📏 Fixed ~4-inch wide History column */
        .history { width: 384px; min-width: 384px; background-color: var(--bg-history); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); overflow-y: auto; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 10px; }
        .history h4 { margin: 0; color: var(--text-muted); }
        .expand-btn { background-color: transparent; border: none; padding: 4px 8px; font-size: 16px; }
        
        #notesContainer { flex: 1; overflow-y: auto; }
        
        /* Note Card styling with dedicated action footers */
        .saved-note-card { background-color: var(--bg-card); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--sidebar-header); font-size: 14px; word-break: break-word; color: var(--text-main); box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .note-body { flex: 1; overflow: hidden; max-height: 180px; text-overflow: ellipsis; }
        
        .note-actions { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 8px; }
        .action-link { font-size: 12px; text-decoration: none; font-weight: bold; color: var(--sidebar-header); background: transparent; border: none; padding: 2px 5px; cursor: pointer; }
        .action-link:hover { opacity: 0.8; }

        /* 🖥️ DASHBOARD OVERLAY (Cleaned Header) */
        .fullscreen-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-body); z-index: 9999; box-sizing: border-box; padding: 40px; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        .modal-header h2 { margin: 0; font-size: 28px; color: var(--sidebar-header); display: flex; align-items: center; gap: 10px; }
        
        .new-note-btn { background-color: var(--btn-green); color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .new-note-btn:hover { background-color: var(--btn-green-hover); }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .grid-note-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-top: 5px solid var(--sidebar-header); border-radius: 8px; padding: 20px; box-shadow: var(--shadow); height: 260px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        .close-modal-x { font-size: 24px; background: transparent; border: none; margin-left: 15px; }
    </style>
</head>
<body>

    <!-- Dashboard Overlay (Starts open by default) -->
    <div id="dashboardModal" class="fullscreen-modal" style="display: block;">
        <div class="modal-header">
            <h2>📜 Note Dashboard</h2>
            <div style="display: flex; align-items: center;">
                <button class="new-note-btn" onclick="closeDashboard()">🟢 + New Note</button>
                <button class="close-modal-x" onclick="closeDashboard()">✕</button>
            </div>
        </div>
        <div id="modalGridContainer" class="grid-container"></div>
    </div>

    <div class="sidebar">
        <h3>💜 Notebooks</h3>
        <p style="color: var(--sidebar-header); font-weight: bold; cursor: pointer;">• Quick Notes</p>
        <p style="color: var(--text-muted); font-size: 13px;">+ Add Custom Section</p>
        <a href="/logout" class="logout-link">🔒 Lock & Log Out</a>
    </div>

    <div class="main-content">
        <div class="ribbon">
            <select id="fontName" onchange="execCommand('fontName', this.value)">
                <option value="Segoe UI">Segoe UI</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>
            
            <select id="fontSize" onchange="changeSize(this.value)">
                <option value="4">Normal</option>
                <option value="6">Heading</option>
                <option value="3">Small</option>
            </select>

            <button onclick="execCommand('bold')">B</button>
            <button onclick="execCommand('italic')">I</button>
            <button onclick="execCommand('underline')">U</button>
            <button onclick="execCommand('insertUnorderedList')">• List</button>
            
            <button class="ai-btn" onclick="askGemini()">✨ Ask Gemini AI</button>
            <button class="save-btn" onclick="saveNote()">Save Note to Cloud</button>
            <button class="download-btn" onclick="downloadNote()">📥 Download Note</button>
            
            <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
        </div>

        <div class="workspace">
            <div id="noteEditor" class="editor" contenteditable="true"></div>
            
            <div class="history">
                <div class="history-header">
                    <h4>📜 Server Saved Notes</h4>
                    <button class="expand-btn" onclick="openDashboard()" title="Expand Dashboard">⛶ Expand</button>
                </div>
                <div id="notesContainer"></div>
            </div>
        </div>
    </div>

    <script>
        function execCommand(command, value = null) {
            document.execCommand(command, false, value);
        }
        
        function changeSize(sizeValue) {
            document.execCommand('fontSize', false, sizeValue);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            if (currentTheme === "dark") {
                document.documentElement.removeAttribute("data-theme");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        }

        function openDashboard() {
            document.getElementById("dashboardModal").style.display = "block";
        }

        function closeDashboard() {
            document.getElementById("dashboardModal").style.display = "none";
        }

        document.addEventListener("DOMContentLoaded", fetchNotes);

        async function fetchNotes() {
            let res = await fetch('/get_notes');
            if (res.status === 200) {
                let notes = await res.json();
                
                let container = document.getElementById("notesContainer");
                container.innerHTML = "";
                
                let gridContainer = document.getElementById("modalGridContainer");
                gridContainer.innerHTML = "";

                notes.forEach(n => {
                    // --- SIDEBAR CARDS ---
                    let div = document.createElement("div");
                    div.classList.add("saved-note-card");
                    
                    let bodyDiv = document.createElement("div");
                    bodyDiv.classList.add("note-body");
                    bodyDiv.innerHTML = n.content;
                    div.appendChild(bodyDiv);

                    let actionDiv = document.createElement("div");
                    actionDiv.classList.add("note-actions");
                    actionDiv.innerHTML = `
                        <button class="action-link" onclick="loadNoteToEditor(\`${encodeURIComponent(n.content)}\`, true)">✏️ Edit</button>
                        <button class="action-link" onclick="downloadDirect(\`${encodeURIComponent(n.content)}\`)">📥 Download</button>
                    `;
                    div.appendChild(actionDiv);
                    container.appendChild(div);

                    // --- DASHBOARD GRID CARDS ---
                    let gridDiv = document.createElement("div");
                    gridDiv.classList.add("grid-note-card");
                    
                    let gridBody = document.createElement("div");
                    gridBody.classList.add("note-body");
                    gridBody.innerHTML = n.content;
                    gridDiv.appendChild(gridBody);

                    let gridAction = document.createElement("div");
                    gridAction.classList.add("note-actions");
                    gridAction.innerHTML = `
                        <button class="action-link" onclick="loadNoteToEditor(\`${encodeURIComponent(n.content)}\`, false)">✏️ Edit</button>
                        <button class="action-link" onclick="downloadDirect(\`${encodeURIComponent(n.content)}\`)">📥 Download</button>
                    `;
                    gridDiv.appendChild(gridAction);
                    gridContainer.appendChild(gridDiv);
                });
            }
        }

        // ✏️ LOAD EXISTING NOTE BACK INTO EDITOR
        function loadNoteToEditor(encodedContent, isSidebar) {
            const decoded = decodeURIComponent(encodedContent);
            document.getElementById("noteEditor").innerHTML = decoded;
            if (!isSidebar) {
                closeDashboard();
            }
        }

        async function saveNote() {
            let editor = document.getElementById("noteEditor");
            let content = editor.innerHTML.trim();
            if (!content) return;

            let res = await fetch('/save_note', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });

            if (res.ok) {
                editor.innerHTML = "";
                fetchNotes();
            }
        }

        // 📥 DYNAMIC DOWNLOAD SYSTEM (Main Ribbon)
        function downloadNote() {
            let editor = document.getElementById("noteEditor");
            let htmlContent = editor.innerHTML.trim();
            executeDownload(htmlContent);
        }

        // 📥 DIRECT DOWNLOAD FOR HISTORICAL CARDS
        function downloadDirect(encodedContent) {
            const rawHtml = decodeURIComponent(encodedContent);
            executeDownload(rawHtml);
        }

        function executeDownload(htmlContent) {
            if (!htmlContent) {
                alert("No note content identified to download!");
                return;
            }

            // Create a temporary element to strip text strings cleanly for txt/md engines
            let tempDiv = document.createElement("div");
            tempDiv.innerHTML = htmlContent;
            let textContent = tempDiv.innerText.trim();

            let choice = prompt("How would you like to download this note?\nType: 'txt', 'html', or 'markdown'").toLowerCase().trim();
            
            let fileContent = "";
            let fileName = "archived-cloud-note";
            let mimeType = "text/plain";

            if (choice === "html") {
                fileContent = `<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><title>Downloaded Note</title></head>\n<body>\n${htmlContent}\n</body>\n</html>`;
                fileName += ".html";
                mimeType = "text/html";
            } else if (choice === "markdown" || choice === "md") {
                fileContent = textContent; 
                fileName += ".md";
            } else if (choice === "txt") {
                fileContent = textContent;
                fileName += ".txt";
            } else {
                alert("Invalid format type selected. Cancelled.");
                return;
            }

            let blob = new Blob([fileContent], { type: mimeType });
            let tempLink = document.createElement("a");
            tempLink.href = URL.createObjectURL(blob);
            tempLink.download = fileName;
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);
        }

        async function askGemini() {
            let editor = document.getElementById("noteEditor");
            let currentText = editor.innerText.trim();
            if (!currentText) {
                alert("Type an AI prompt directly into the notebook canvas first!");
                return;
            }

            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            const loadingColor = isDark ? "#03dac6" : "#007a70";

            editor.innerHTML += `<br><br><i style='color:${loadingColor};'>Gemini is writing... ✨</i><br>`;
            
            let res = await fetch('/ask_gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: currentText })
            });

            let data = await res.json();
            fetchNotes(); 
            
            if (data.reply) {
                let formattedReply = `<br><div style='color:var(--ai-text); border-left:3px solid var(--ai-text); padding-left:10px; margin:10px 0;'>` + 
                                     data.reply.replace(/\n/g, "<br>") + 
                                     "</div><br>";
                editor.innerHTML = currentText + formattedReply;
            } else {
                alert("Error calling AI: " + (data.error || "Unknown glitch"));
                fetchNotes();
            }
        }
    </script>
</body>
</html>
