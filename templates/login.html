<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
            border-top: 5px solid #bb86fc;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #bb86fc;
            color: #121212;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #9965db; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 Private Notebook</h2>
    <p style="color: #aaa; font-size: 14px;">Enter password to decrypt your cloud notes</p>
    <form action="/login" method="POST">
        <input type="password" name="password" placeholder="Enter Password" required autocomplete="current-password">
        <button type="submit">Unlock Notes</button>
    </form>
</div>

</body>
</html>
